{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-Applied { background-color: #0d6efd22; border-left: 4px solid #0d6efd; }
        .status-Interview { background-color: #ffc10722; border-left: 4px solid #ffc107; }
        .status-Offer { background-color: #19875422; border-left: 4px solid #198754; }
        .status-Rejected { background-color: #dc354522; border-left: 4px solid #dc3545; }
        .job-item { transition: opacity 0.3s ease; }
        .job-item.htmx-swapping { opacity: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'tracker:dashboard' %}">📋 Job Tracker</a>
            {% if user.is_authenticated %}
            <div class="d-flex align-items-center">
                <span class="text-light me-3">Hello, {{ user.username }}</span>
                <a href="{% url 'tracker:logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.body.addEventListener('htmx:configRequest', function(event) {
            if (event.detail.verb !== 'get') {
                event.detail.headers['X-CSRFToken'] = getCookie('csrftoken');
            }
        });

        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        document.body.addEventListener('htmx:afterRequest', function(event) {
            var elt = event.detail.elt;
            if (elt.id === 'job-form' && event.detail.successful) {
                elt.reset();
            }
        });
    </script>
</body>
</html>
