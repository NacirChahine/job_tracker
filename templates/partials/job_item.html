<div class="card mb-3 job-item status-{{ job.status }}" id="job-{{ job.id }}">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h6 class="card-title mb-1">
                    {{ job.position }}
                    <span class="badge
                        {% if job.status == 'Applied' %}bg-primary
                        {% elif job.status == 'Interview' %}bg-warning text-dark
                        {% elif job.status == 'Offer' %}bg-success
                        {% elif job.status == 'Rejected' %}bg-danger
                        {% endif %} ms-2">{{ job.status }}</span>
                </h6>
                <h6 class="card-subtitle text-muted mb-2">{{ job.company_name }}</h6>
                <small class="text-muted">Applied: {{ job.applied_date|date:"M d, Y" }}</small>
                {% if job.link %}
                <a href="{{ job.link }}" target="_blank" class="ms-2 small">🔗 Link</a>
                {% endif %}
            </div>

            <div class="d-flex align-items-center gap-2">
                <form hx-post="{% url 'tracker:job_status_update' job.id %}"
                      hx-target="#job-{{ job.id }}"
                      hx-swap="outerHTML"
                      class="d-flex align-items-center gap-1">
                    {% csrf_token %}
                    <select name="status" class="form-select form-select-sm"
                            onchange="this.form.dispatchEvent(new Event('submit', {cancelable:true,bubbles:true}))"
                            style="width: auto;">
                        {% for value, label in job.STATUS_CHOICES %}
                        <option value="{{ value }}" {% if job.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </form>

                <button class="btn btn-outline-primary btn-sm"
                        hx-get="{% url 'tracker:job_edit_form' job.id %}"
                        hx-target="#job-{{ job.id }}"
                        hx-swap="outerHTML">
                    ✏️ Edit
                </button>

                <button class="btn btn-outline-danger btn-sm"
                        hx-delete="{% url 'tracker:job_delete' job.id %}"
                        hx-target="closest .job-item"
                        hx-swap="outerHTML swap:0.3s"
                        hx-confirm="Are you sure you want to delete this application?">
                    🗑️
                </button>
            </div>
        </div>

        {% if job.notes %}
        <hr class="my-2">
        <div id="notes-{{ job.id }}">
            <small class="text-muted">Notes:</small>
            <p class="mb-0 small">{{ job.notes|linebreaksbr }}</p>
            <button class="btn btn-link btn-sm p-0 mt-1"
                    hx-get="{% url 'tracker:job_notes_edit' job.id %}"
                    hx-target="#notes-{{ job.id }}"
                    hx-swap="innerHTML">
                Edit Notes
            </button>
        </div>
        {% else %}
        <div id="notes-{{ job.id }}">
            <button class="btn btn-link btn-sm p-0 mt-1"
                    hx-get="{% url 'tracker:job_notes_edit' job.id %}"
                    hx-target="#notes-{{ job.id }}"
                    hx-swap="innerHTML">
                + Add Notes
            </button>
        </div>
        {% endif %}
    </div>
</div>
